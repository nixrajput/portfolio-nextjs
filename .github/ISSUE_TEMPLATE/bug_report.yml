name: Bug Report
description: File a bug report for portfolio-nextjs v2
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: ["nixrajput"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
        Before submitting, please check the [existing issues](https://github.com/nixrajput/portfolio-nextjs/issues) to avoid duplicates.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the site is affected?
      multiple: false
      options:
        - Homepage / Hero
        - Projects section
        - Experience / Skills
        - Testimonials
        - Admin panel
        - SEO / Meta
        - CI / Build
        - Other
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you see, and what did you expect?
      placeholder: "Expected: ... Actual: ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device type
      multiple: true
      options:
        - Desktop (macOS)
        - Desktop (Windows)
        - Desktop (Linux)
        - Mobile (iOS)
        - Mobile (Android)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "e.g. Chrome 125, Safari 17"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant console output or error messages
      description: Paste any relevant logs. This will be automatically formatted as code.
      render: shell

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      description: By submitting this issue you agree to follow our [Code of Conduct](https://github.com/nixrajput/portfolio-nextjs/blob/master/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
