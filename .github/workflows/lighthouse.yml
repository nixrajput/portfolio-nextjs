name: Lighthouse

on:
  pull_request:
    branches: [master, v2]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lh
          POSTGRES_PASSWORD: lh
          POSTGRES_DB: portfolio_lh
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Migrate + seed before building: the ISR homepage is prerendered at
      # build time and queries the database.
      - name: Run DB migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgres://lh:lh@localhost:5432/portfolio_lh

      - name: Seed database
        run: bun run db:seed
        env:
          DATABASE_URL: postgres://lh:lh@localhost:5432/portfolio_lh

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgres://lh:lh@localhost:5432/portfolio_lh
          AUTH_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: https://nixrajput.com

      - name: Run Lighthouse CI
        run: bunx @lhci/cli@latest autorun
        env:
          DATABASE_URL: postgres://lh:lh@localhost:5432/portfolio_lh
          AUTH_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: https://nixrajput.com
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
