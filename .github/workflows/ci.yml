name: CI

on:
  push:
    branches: [master, v2]
  pull_request:
    branches: [master, v2]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: build
          POSTGRES_PASSWORD: build
          POSTGRES_DB: portfolio_build
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://build:build@localhost:5432/portfolio_build
      AUTH_SECRET: ci-dummy-secret
      NEXT_PUBLIC_SITE_URL: https://nixrajput.com
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bunx eslint .

      - name: Format check
        run: bunx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Unit & component tests
        run: bunx vitest run

      # The homepage uses ISR, so it is prerendered at build time and needs a
      # reachable database. Migrate + seed before building.
      - name: Run DB migrations
        run: bunx drizzle-kit migrate

      - name: Seed database
        run: bun run db:seed

      - name: Build
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e
          POSTGRES_DB: portfolio_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Migrate + seed before building: the ISR homepage is prerendered at
      # build time and queries the database.
      - name: Run DB migrations
        run: bunx drizzle-kit migrate
        env:
          DATABASE_URL: postgres://e2e:e2e@localhost:5432/portfolio_e2e

      - name: Seed database
        run: bun run db:seed
        env:
          DATABASE_URL: postgres://e2e:e2e@localhost:5432/portfolio_e2e

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: postgres://e2e:e2e@localhost:5432/portfolio_e2e
          AUTH_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: https://nixrajput.com

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: bunx playwright test
        env:
          DATABASE_URL: postgres://e2e:e2e@localhost:5432/portfolio_e2e
          AUTH_SECRET: ci-dummy-secret
          NEXT_PUBLIC_SITE_URL: https://nixrajput.com
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
